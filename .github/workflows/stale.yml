name: Close stale issues
on:
  schedule:
    - cron: '0 8 * * 1'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been automatically marked as stale. If no activity occurs in 14 days, it will be closed.'
          close-issue-message: 'This issue has been automatically closed due to inactivity.'
          days-before-stale: 90
          days-before-close: 14
          stale-issue-label: stale
          exempt-issue-labels: 'help wanted,good first issue,security'
